<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>News</title>

  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="News" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Inter:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f4f9;
      --surface: #fff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --light: #94a3b8;
      --accent: #16a34a;
      --accent-dark: #15803d;
      --accent-light: #f0fdf4;
      --accent-border: #bbf7d0;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.05);
    }

    body {
      font-family: "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #334155 100%);
      padding: 34px 28px 30px;
      text-align: center;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #86efac;
      margin-bottom: 14px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    h1 {
      font-family: "Inter", sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -.03em;
      color: #fff;
      line-height: 1.08;
    }

    .subtitle {
      font-size: .8rem;
      color: #94a3b8;
      margin-top: 8px;
    }

    .card-body { padding: 24px; }

    .section {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      background: #f8fafc;
    }

    .section-title {
      font-size: .78rem;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .last-report {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-light);
      border-color: var(--accent-border);
    }

    .last-report .icon { font-size: 1.2rem; }
    .last-report .info { flex: 1; }
    .label { font-size: .72rem; color: var(--accent-dark); font-weight: 800; }
    .date { font-size: .92rem; font-weight: 700; color: var(--text); margin-top: 2px; }

    .select-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: .92rem;
      padding: 0 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: none;
      border-radius: 10px;
      min-height: 44px;
      padding: 0 15px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font: inherit;
      font-size: .86rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent-dark); }

    .empty {
      text-align: center;
      color: var(--light);
      font-size: .88rem;
      line-height: 1.7;
      padding: 4px 0;
    }

    .notice {
      background: var(--accent-light);
      border-color: var(--accent-border);
      color: var(--accent-dark);
      font-size: .82rem;
      line-height: 1.6;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: var(--light);
      font-size: .72rem;
      line-height: 1.6;
    }

    @media (max-width: 380px) {
      .select-row { grid-template-columns: 1fr; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="live-badge"><span class="live-dot"></span> AI News Digest</div>
      <h1>Today's<br>Main News</h1>
      <p class="subtitle">매일 오전 9시 기준 주요 뉴스를 정리합니다</p>
    </div>

    <div class="card-body">
      {% if report_date %}
      <div class="section last-report">
        <span class="icon">📰</span>
        <div class="info">
          <div class="label">마지막 리포트</div>
          <div class="date">{{ report_date }}</div>
        </div>
        <a class="btn" href="/report">보기</a>
      </div>
      {% endif %}

      <div class="section">
        <div class="section-title">날짜별 리포트 보기</div>
        {% if reports %}
        <div class="select-row">
          <select id="reportDate" aria-label="리포트 날짜 선택">
            {% for report in reports %}
            <option value="{{ report.date }}">{{ report.label }}</option>
            {% endfor %}
          </select>
          <button class="btn" type="button" onclick="openSelectedReport()">선택 보기</button>
        </div>
        {% else %}
        <div class="empty">아직 생성된 리포트가 없습니다.<br />매일 오전 9시에 자동으로 생성됩니다.</div>
        {% endif %}
      </div>

      <div class="section notice">
        리포트는 자동으로 생성됩니다. 앱을 열면 날짜를 선택해 지난 리포트를 확인할 수 있습니다.
      </div>
    </div>
  </div>

  <p class="footer-note">
    매일 오전 9시 기준 리포트가 자동 생성됩니다.
  </p>

  <script>
    function openSelectedReport() {
      const select = document.getElementById('reportDate');
      if (!select || !select.value) return;
      window.location.href = '/report?date=' + encodeURIComponent(select.value);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js');
    }
  </script>
</body>
</html>
