<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Today's Main News</title>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="뉴스 다이제스트" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Inter:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f4f9;
      --surface: #fff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --light: #94a3b8;
      --accent: #16a34a;
      --accent-dark: #15803d;
      --accent-light: #f0fdf4;
      --accent-border: #bbf7d0;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.05);
    }

    html, body { height: 100%; }
    body {
      font-family: "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── 카드 래퍼 ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    .card-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #334155 100%);
      padding: 32px 28px 28px;
      text-align: center;
      position: relative;
    }
    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: #86efac; margin-bottom: 14px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .card-header h1 {
      font-family: "Inter", sans-serif;
      font-size: 1.7rem; font-weight: 800;
      letter-spacing: -.03em; color: #fff;
      line-height: 1.1;
    }
    .card-header p {
      font-size: 0.78rem; color: #94a3b8;
      margin-top: 6px;
    }

    /* ── 바디 ── */
    .card-body { padding: 24px 24px 28px; }

    /* 마지막 리포트 정보 */
    .last-report {
      display: flex; align-items: center; gap: 10px;
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 20px;
    }
    .last-report .icon { font-size: 1.2rem; flex-shrink: 0; }
    .last-report .info { flex: 1; }
    .last-report .label { font-size: 0.7rem; color: var(--accent-dark); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .last-report .date { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-top: 1px; }
    .view-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      padding: 7px 13px; font-size: 0.78rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      font-family: inherit; flex-shrink: 0;
      transition: background .15s;
    }
    .view-btn:hover { background: var(--accent-dark); }

    .no-report {
      text-align: center;
      color: var(--light);
      font-size: 0.83rem;
      padding: 12px 0 18px;
    }

    /* 분석 버튼 */
    .run-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 14px rgba(22,163,74,.35);
    }
    .run-btn:hover { opacity: .92; }
    .run-btn:active { transform: scale(.98); }
    .run-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .run-btn .btn-icon { font-size: 1.15rem; }

    /* 진행 상태 */
    .progress-box {
      display: none;
      margin-top: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
    }
    .progress-box.visible { display: block; }

    .step-label {
      font-size: 0.82rem; font-weight: 600;
      color: var(--text); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar-wrap {
      background: var(--border);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, var(--accent), #4ade80);
      height: 100%;
      border-radius: 999px;
      transition: width .4s ease;
      width: 0%;
    }

    .step-list {
      list-style: none;
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .step-list li {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: var(--light);
    }
    .step-list li.done { color: var(--accent-dark); font-weight: 600; }
    .step-list li.done::before { content: "✓"; color: var(--accent); font-weight: 700; }
    .step-list li:not(.done)::before { content: "○"; }

    /* 에러 */
    .error-box {
      display: none;
      margin-top: 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.8rem;
      color: #dc2626;
    }
    .error-box.visible { display: block; }

    /* 완료 — 자동 이동하므로 별도 UI 불필요 */

    .footer-note {
      margin-top: 20px;
      font-size: 0.72rem;
      color: var(--light);
      text-align: center;
      line-height: 1.6;
    }
    .footer-note strong { color: var(--muted); }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="live-badge"><span class="live-dot"></span> AI News Digest</div>
    <h1>Today's<br>Main News</h1>
    <p>AI가 뉴스를 분석하고 요약합니다</p>
  </div>

  <div class="card-body">
    {% if report_date %}
    <div class="last-report">
      <span class="icon">📰</span>
      <div class="info">
        <div class="label">마지막 리포트</div>
        <div class="date">{{ report_date }}</div>
      </div>
      <a class="view-btn" href="/report" target="_blank">보기 →</a>
    </div>
    {% else %}
    <div class="no-report">아직 생성된 리포트가 없습니다.<br>아래 버튼을 눌러 분석을 시작하세요.</div>
    {% endif %}

    <button class="run-btn" id="runBtn" onclick="startAnalysis()">
      <span class="btn-icon">🔍</span>
      <span id="btnText">오늘 뉴스 분석하기</span>
    </button>
    <p style="text-align:center;font-size:0.72rem;color:var(--light);margin-top:10px;">
      분석에 약 2~3분 소요됩니다
    </p>

    <!-- 진행 상태 -->
    <div class="progress-box" id="progressBox">
      <div class="step-label">
        <div class="spinner"></div>
        <span id="stepLabel">준비 중...</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <ul class="step-list" id="stepList">
        <li id="s1">뉴스 수집</li>
        <li id="s2">기사 AI 분석</li>
        <li id="s3">트렌드 분석</li>
        <li id="s4">리포트 저장</li>
      </ul>
    </div>

    <!-- 에러 -->
    <div class="error-box" id="errorBox"></div>

  </div>
</div>

<p class="footer-note">
  같은 WiFi에서 Android 접속:<br>
  <strong>http://&lt;PC의 IP주소&gt;:5000</strong>
</p>

<script>
  let polling = null;
  let startTime = null;
  const TIMEOUT_MS = 5 * 60 * 1000; // 5분 타임아웃

  async function startAnalysis() {
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    document.getElementById('btnText').textContent = '분석 중...';
    document.getElementById('progressBox').classList.add('visible');
    document.getElementById('errorBox').classList.remove('visible');
    startTime = Date.now();

    try {
      const res = await fetch('/analyze', { method: 'POST' });
      const data = await res.json();
      if (!data.ok) { showError(data.msg); return; }
    } catch(e) {
      showError('서버 연결 실패. 잠시 후 다시 시도해주세요.'); return;
    }

    polling = setInterval(pollStatus, 2000);
  }

  async function pollStatus() {
    // 5분 초과 시 타임아웃
    if (Date.now() - startTime > TIMEOUT_MS) {
      clearInterval(polling);
      showError('분석 시간이 초과됐습니다. 다시 시도해주세요.');
      resetBtn();
      return;
    }

    try {
      const res = await fetch('/status?t=' + Date.now()); // 캐시 방지
      const s = await res.json();
      updateUI(s);
    } catch(e) {
      // 일시적 네트워크 오류는 무시하고 계속 시도
    }
  }

  function updateUI(s) {
    const pct = (s.steps_done / s.steps_total) * 100;
    document.getElementById('progressBar').style.width = pct + '%';

    // 경과 시간 표시
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const stepText = s.step || '진행 중...';
    document.getElementById('stepLabel').textContent = stepText + ` (${elapsed}초)`;

    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById('s' + i);
      if (s.steps_done >= i) el.classList.add('done');
      else el.classList.remove('done');
    }

    if (s.error) {
      clearInterval(polling);
      showError(s.error);
      resetBtn();
    } else if (!s.running && s.steps_done === 4) {
      clearInterval(polling);
      window.location.href = '/report';
    } else if (!s.running && s.steps_done === 0 && elapsed > 10) {
      // 서버 재시작으로 상태 초기화된 경우
      clearInterval(polling);
      showError('서버가 재시작됐습니다. 다시 시도해주세요.');
      resetBtn();
    }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠️ ' + msg;
    box.classList.add('visible');
    document.getElementById('progressBox').classList.remove('visible');
  }

  function resetBtn() {
    const btn = document.getElementById('runBtn');
    btn.disabled = false;
    document.getElementById('btnText').textContent = '다시 분석하기';
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
  }
</script>
</body>
</html>
